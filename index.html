<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>moonlett</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            border-radius: 0 !important;
        }

        body {
            font-family: system-ui, sans-serif;
            background: #0a0c12;
            padding: 2rem;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at 30% 20%, rgba(255, 255, 245, 0.55) 0%, rgba(10, 12, 18, 0) 65%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: "";
            position: fixed;
            top: -10%;
            right: -10%;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle at 70% 40%, rgba(255, 250, 235, 0.35) 0%, rgba(10, 12, 18, 0) 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 900px;
            width: 100%;
            margin: 0;
            background: #111317;
            border: 1px solid #2a2e3a;
            position: relative;
            z-index: 2;
            box-shadow: 0 20px 35px -15px rgba(0,0,0,0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 2px solid #2a2e3a;
        }

        .site-title {
            font-size: 1.8rem;
            font-weight: bold;
            color: #f0ede8;
            letter-spacing: -0.3px;
            text-shadow: 0 0 5px rgba(255, 245, 200, 0.4);
        }

        .chicken-img {
            width: 42px;
            height: 42px;
            display: block;
            filter: drop-shadow(0 0 3px rgba(255, 240, 170, 0.5));
        }

        .content {
            padding: 2rem;
        }

        .social-links {
            margin: 0;
            padding: 0;
        }

        .social-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.2rem;
            font-size: 1.1rem;
        }

        .social-label {
            font-weight: bold;
            width: 70px;
            color: #b9b7c2;
        }

        .social-value {
            color: #e6e2d8;
            text-decoration: none;
            border-bottom: 2px solid #5f5d6e;
            transition: all 0.1s linear;
        }

        .social-value:hover {
            background: #e6e2d8;
            color: #111317;
            border-bottom-color: #e6e2d8;
        }

        .discord-text {
            color: #e6e2d8;
            border-bottom: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="site-title">moonlett.com</div>
        <img class="chicken-img" src="https://raw.githubusercontent.com/twitter/twemoji/master/assets/72x72/1f414.png" alt="🐔">
    </div>
    <div class="content">
        <div class="social-links">
            <div class="social-item">
                <span class="social-label">Steam:</span>
                <a href="https://steamcommunity.com/id/moonlett" class="social-value" target="_blank">moonlett</a>
            </div>
            <div class="social-item">
                <span class="social-label">Discord:</span>
                <span class="discord-text">moonlett</span>
            </div>
        </div>
    </div>
</div>
</body>
</html>
